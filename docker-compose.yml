# PostgreSQL for local development. From repo root: docker compose up -d
services:
  postgres:
    image: postgres:16-alpine
    container_name: devflow-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: devflow
    ports:
      - "5432:5432"
    volumes:
      - devflow_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d devflow"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  devflow_pgdata:
